name: Shadow Twin Safety Check

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  shadow_twin:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout proposed change
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (clean)
        run: |
              rm -rf node_modules
              npm ci
              npm rebuild better-sqlite3 --build-from-source

      - name: 🌱 Seed Shadow Database
        run: node src/seed.js
        env:
          DB_NAME: shadow.sqlite

      - name: 🚀 Start Shadow Twin Server
        run: |
          PORT=3001 DB_NAME=shadow.sqlite node src/app.js &
          echo "Shadow Twin started on port 3001"
          sleep 3  # wait for server to be ready
        env:
          PORT: 3001
          DB_NAME: shadow.sqlite

      - name: 🧪 Run Shadow Twin Tests
        run: node tests/shadow-tests.js
        env:
          PORT: 3000
          DB_NAME: shadow.sqlite

      - name: 📊 Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '🚨';
            const decision = status === 'success' ? 'APPROVED' : 'BLOCKED';
            const message = status === 'success'
              ? 'All Shadow Twin checks passed. This change is safe to merge.'
              : 'Shadow Twin detected a problem. This change has been **blocked**. Human review required.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${emoji} Shadow Twin Decision: ${decision}\n\n${message}\n\n> *Codex never touches production first — it must survive the shadow world.*`
            });

      - name: Write Shadow Twin audit log
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const log = {
            repo: process.env.GITHUB_REPOSITORY,
            run_id: process.env.GITHUB_RUN_ID,
            run_number: process.env.GITHUB_RUN_NUMBER,
            workflow: process.env.GITHUB_WORKFLOW,
            job: process.env.GITHUB_JOB,
            actor: process.env.GITHUB_ACTOR,
            event: process.env.GITHUB_EVENT_NAME,
            ref: process.env.GITHUB_REF,
            sha: process.env.GITHUB_SHA,
            pr_number: process.env.GITHUB_EVENT_PATH ? JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,'utf8')).pull_request?.number : null,
            timestamp_utc: new Date().toISOString(),
            // Fill these in from your own outputs later:
            security_risk_pct: process.env.SECURITY_RISK_PCT || null,
            defect_risk_pct: process.env.DEFECT_RISK_PCT || null,
            decision: process.env.SHADOW_DECISION || null,
            reasons: (process.env.SHADOW_REASONS || '').split('|').filter(Boolean)
          };
          fs.writeFileSync('shadowtwin-log.json', JSON.stringify(log, null, 2));
          console.log('Wrote shadowtwin-log.json');
          "        
